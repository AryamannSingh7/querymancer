# Querymancer eval suite
#
# 150 questions across 3 databases (northwind, hr, ipl). Each case is graded
# by row-count: rows_count must satisfy expected_min_rows <= n <= expected_max_rows.
# expected_columns_subset and must_contain_value are advisory — reported as
# "soft" assertions but they do not gate overall success.
#
# Difficulty:
#   simple  — single table, single aggregate / filter / count
#   medium  — 1-2 JOINs, GROUP BY, ORDER BY + LIMIT
#   hard    — 3+ JOINs, subquery, window function, CTE, or tricky semantics
#
# Author: keep expected_min/max generous unless the question forces a tight bound
# (e.g. "top 5" → max=5; "list categories" → exactly 8).

